<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2E7D32"/>
      <stop offset="1" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="dome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD54F"/>
      <stop offset="1" stop-color="#C8A415"/>
    </linearGradient>
    <linearGradient id="bld" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E8F5E9"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle ground line -->
  <rect x="86" y="398" width="340" height="40" rx="6" fill="url(#bld)" opacity="0.95"/>

  <!-- Left minaret -->
  <rect x="120" y="180" width="34" height="220" rx="8" fill="url(#bld)"/>
  <path d="M137 150 L120 182 L154 182 Z" fill="url(#dome)"/>
  <circle cx="137" cy="146" r="9" fill="url(#dome)"/>
  <rect x="125" y="238" width="24" height="6" rx="3" fill="#C8E6C9"/>

  <!-- Right minaret -->
  <rect x="358" y="180" width="34" height="220" rx="8" fill="url(#bld)"/>
  <path d="M375 150 L358 182 L392 182 Z" fill="url(#dome)"/>
  <circle cx="375" cy="146" r="9" fill="url(#dome)"/>
  <rect x="363" y="238" width="24" height="6" rx="3" fill="#C8E6C9"/>

  <!-- Main building body -->
  <rect x="170" y="252" width="172" height="148" rx="10" fill="url(#bld)"/>

  <!-- Main dome -->
  <path d="M170 256 Q170 168 256 168 Q342 168 342 256 Z" fill="url(#dome)"/>
  <!-- Finial on dome -->
  <circle cx="256" cy="150" r="10" fill="url(#dome)"/>
  <rect x="252" y="118" width="8" height="28" rx="4" fill="url(#dome)"/>
  <path d="M260 122 q22 6 0 14 z" fill="url(#dome)"/>

  <!-- Central arched door -->
  <path d="M232 400 L232 330 Q256 300 280 330 L280 400 Z" fill="#1B5E20"/>

  <!-- Side arched windows -->
  <path d="M193 392 L193 348 Q205 332 217 348 L217 392 Z" fill="#2E7D32"/>
  <path d="M295 392 L295 348 Q307 332 319 348 L319 392 Z" fill="#2E7D32"/>

  <!-- Crescent moon top center -->
  <g transform="translate(256,86)">
    <path d="M0 -34 A34 34 0 1 0 24 24 A27 27 0 1 1 0 -34 Z" fill="#FFD54F"/>
  </g>
</svg>
